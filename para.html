<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap" rel="stylesheet">

<title>📖 قرآن مجید - 30 پارے</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>

body{
font-family:'Amiri', serif;
margin:0;
background:linear-gradient(135deg,#0f9d8a,#0a6cff);
min-height:100vh;
}

/* Header */

header{
background:linear-gradient(45deg,#0a6cff,#0f9d8a);
color:white;
text-align:center;
padding:15px;
font-size:24px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* Grid */

.juzList{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

/* Cards */

.juz-btn{
background:linear-gradient(135deg,#ffffff,#e8f0ff);
border:2px solid #0a6cff;
border-radius:14px;
padding:20px;
text-align:center;
font-size:20px;
color:#0a6cff;
box-shadow:0 5px 12px rgba(0,0,0,0.15);
cursor:pointer;
transition:0.3s;
}

.juz-btn:hover{
transform:scale(1.05);
}

/* Reader */

#reader{
display:none;
padding:15px;
background:white;
border-radius:12px;
margin:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

#juzTitle{
text-align:center;
font-size:24px;
margin-bottom:15px;
color:#0a6cff;
}

.ayah{
font-size:26px;
direction:rtl;
text-align:right;
line-height:2;
margin:8px 0;
}

/* Audio */

.audio-player{
width:100%;
margin-top:10px;
}

/* Back Button */

.back-btn{
margin-top:15px;
background:linear-gradient(45deg,#0a6cff,#0f9d8a);
color:white;
padding:12px;
border:none;
width:100%;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<header>📖 القرآن الکریم</header>

<div class="juzList" id="juzList"></div>

<div id="reader">

<div id="juzTitle"></div>

<div id="juzArabic">لوڈ ہو رہا ہے...</div>

<audio id="audioPlayer" class="audio-player" controls></audio>

<button class="back-btn" onclick="backToList()">🔙 واپس</button>

</div>

<script>

// Juz audio links

const juzAudioLinks=[
"http://bit.ly/2qpLHGY","http://bit.ly/2qnS2Ha","http://bit.ly/2sbSqoq","http://bit.ly/2r6TOeq",
"http://bit.ly/2qzzsYk","http://bit.ly/2qI4EE2","http://bit.ly/2rW88HS","http://bit.ly/2qK0aO4",
"http://bit.ly/2rBqzB0","http://bit.ly/2s3dkdd","http://bit.ly/2so5po5","http://bit.ly/2rzgVP9",
"http://bit.ly/2rSIJ1l","http://bit.ly/2sk5Lid","http://bit.ly/2rKJHw3","http://bit.ly/2sMTr7y",
"http://bit.ly/2r9opp2","http://bit.ly/2rpK4c8","http://bit.ly/2rpq1iW","http://bit.ly/2rAX4Mc",
"http://bit.ly/2rBv2Aa","http://bit.ly/2sbmkft","http://bit.ly/2rtPXpH","http://bit.ly/2sfUCOE",
"http://bit.ly/2smfZxF","http://bit.ly/2tLUEvC","http://bit.ly/2tru5wz","http://bit.ly/2rXeW98",
"http://bit.ly/2s5NLEk","http://bit.ly/2s1BBB4"
];

// create juz cards

const listDiv=document.getElementById("juzList");

for(let i=1;i<=30;i++){

const btn=document.createElement("div");

btn.className="juz-btn";

btn.innerText="پارہ "+i;

btn.onclick=()=>openJuz(i);

listDiv.appendChild(btn);

}

// open juz

function openJuz(num){

document.getElementById("juzList").style.display="none";

document.getElementById("reader").style.display="block";

document.getElementById("juzTitle").innerText="📖 پارہ "+num;

fetch(`https://api.alquran.cloud/v1/juz/${num}/quran-uthmani`)

.then(res=>res.json())

.then(d=>{

let html="";

d.data.ayahs.forEach(a=>{

html+=`<div class="ayah">${a.text}</div>`;

});

document.getElementById("juzArabic").innerHTML=html;

});

document.getElementById("audioPlayer").src=juzAudioLinks[num-1];

}

// back

function backToList(){

document.getElementById("reader").style.display="none";

document.getElementById("juzList").style.display="grid";

}

</script>

</body>
</html>

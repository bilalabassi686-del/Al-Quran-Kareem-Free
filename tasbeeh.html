<style>

#tasbeeh{
max-width:700px;
margin:auto;
padding:20px;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
border-radius:20px;
}

/* Card */

.tasbeeh-box{
background:linear-gradient(145deg,#ffffff,#e6e9f0);
padding:30px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
border:2px solid #2b7cff;
text-align:center;
}

/* Dark Mode */

.dark{
background:#0f2027;
color:white;
}

.dark .tasbeeh-box{
background:linear-gradient(145deg,#2f3640,#353b48);
}

/* Counter */

.counter{
font-size:50px;
font-weight:bold;
margin:20px 0;
color:#2b7cff;
text-shadow:0 0 10px rgba(43,124,255,0.7);
}

/* Zikr */

.zikr{
font-size:20px;
margin-bottom:15px;
font-weight:bold;
}

/* Beads */

.beads{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-bottom:20px;
}

.bead{
width:16px;
height:16px;
margin:5px;
border-radius:50%;
background:linear-gradient(145deg,#dcdde1,#f5f6fa);
box-shadow:inset 2px 2px 5px rgba(0,0,0,0.2),
2px 2px 5px rgba(0,0,0,0.2);
transition:0.2s;
}

.active{
background:linear-gradient(145deg,#2b7cff,#1d5fd1);
box-shadow:0 0 10px rgba(43,124,255,0.8);
}

/* Buttons */

.countBtn{
background:linear-gradient(145deg,#2b7cff,#1d5fd1);
color:white;
border:none;
padding:20px 35px;
font-size:22px;
border-radius:50px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
margin:6px;
transition:0.2s;
}

.countBtn:active{
transform:scale(0.95);
}

.modeBtn{
background:linear-gradient(145deg,#00b894,#00a383);
color:white;
border:none;
padding:9px 16px;
margin:6px;
border-radius:10px;
cursor:pointer;
}

.resetBtn{
background:linear-gradient(145deg,#ff4757,#d63031);
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}

.darkBtn{
background:#333;
color:white;
border:none;
padding:8px 16px;
margin-top:10px;
border-radius:8px;
cursor:pointer;
}

</style>


<section id="tasbeeh">

<div class="tasbeeh-box">

<h2>🕌 Digital Tasbeeh</h2>

<div class="zikr" id="zikrName">SubhanAllah</div>

<div class="counter" id="count">0</div>

<div class="beads" id="beads"></div>

<button class="countBtn" onclick="addCount()">TAP</button>

<br>

<button class="modeBtn" onclick="setLimit(33)">33</button>
<button class="modeBtn" onclick="setLimit(99)">99</button>

<br>

<button class="modeBtn" onclick="setZikr('SubhanAllah')">SubhanAllah</button>
<button class="modeBtn" onclick="setZikr('Alhamdulillah')">Alhamdulillah</button>
<button class="modeBtn" onclick="setZikr('Allahu Akbar')">Allahu Akbar</button>

<br>

<button class="resetBtn" onclick="resetCount()">Reset</button>

<br>

<button class="darkBtn" onclick="toggleDark()">Dark Mode</button>

</div>

<script>

let count = 0;
let limit = 33;

const countEl = document.getElementById("count");
const beadsEl = document.getElementById("beads");

/* Create beads */

function createBeads(){

beadsEl.innerHTML="";

for(let i=0;i<limit;i++){

let bead=document.createElement("div");

bead.classList.add("bead");

beadsEl.appendChild(bead);

}

}

createBeads();

/* Count */

function addCount(){

count++;

if(navigator.vibrate) navigator.vibrate(30);

if(count>limit) count=1;

countEl.innerText=count;

updateBeads();

playClick();

}

/* Update beads */

function updateBeads(){

let beads=document.querySelectorAll(".bead");

beads.forEach((b,i)=>{

b.classList.remove("active");

if(i<count) b.classList.add("active");

});

}

/* Reset */

function resetCount(){

count=0;

countEl.innerText=count;

updateBeads();

}

/* Limit */

function setLimit(num){

limit=num;

resetCount();

createBeads();

}

/* Zikr */

function setZikr(name){

document.getElementById("zikrName").innerText=name;

resetCount();

}

/* Dark Mode */

function toggleDark(){

document.body.classList.toggle("dark");

}

/* Sound */

function playClick(){

let audio=new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

audio.play();

}

</script>

</section>
